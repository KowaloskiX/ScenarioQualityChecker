name: Java CI and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Build application and documentation
        run: mvn --batch-mode --update-snapshots clean verify

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scenarioqualitychecker-build-artifacts
          path: target/*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Verify tag matches pom.xml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn --batch-mode --quiet help:evaluate -Dexpression=project.version -DforceStdout)"
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match pom.xml version $POM_VERSION"
            exit 1
          fi

      - name: Build release artifacts
        run: mvn --batch-mode --update-snapshots clean package

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for Scenario Quality Checker.

            Included assets:
            - runnable application JAR
            - generated Javadoc JAR
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            target/*.jar
